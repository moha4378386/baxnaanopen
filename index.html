<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USD to SLSH Converter</title>
    <!-- Waxaan isticmaalaynaa Tailwind CSS si uu u qurux badnaado -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

    <!-- Card-ka App-ka -->
    <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-sm">
        
        <h2 class="text-3xl font-black text-gray-800 mb-6 text-center tracking-tight">USD - SLSH</h2>
        
        <!-- Input-ka -->
        <div class="mb-5">
            <label class="block text-sm font-bold text-gray-500 mb-2">Geli Lacagta USD:</label>
            <input type="number" id="usdInput" 
                   class="w-full p-4 text-xl border-2 border-gray-200 rounded-2xl bg-gray-50 focus:border-green-500 focus:outline-none transition-all" 
                   placeholder="Tusaale: 100">
        </div>

        <!-- Badhanka -->
        <button id="calc-btn" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-4 rounded-2xl transition transform active:scale-95 text-lg shadow-lg">
            Xisaabi
        </button>

        <!-- Meesha natiijada kasoo baxayso -->
        <div id="result-area" class="mt-6 p-5 bg-green-600 rounded-2xl text-white hidden animate-fade-in shadow-xl">
            <p class="text-sm opacity-80 uppercase tracking-widest font-bold">Natiijada (SLSH):</p>
            <p class="text-3xl font-black mt-1" id="res-total"></p>
        </div>

        <!-- Badhanka Nadiifinta -->
        <button id="clear-btn" class="w-full mt-4 text-gray-400 font-bold py-2 hover:text-red-500 transition">
            Nadiifi
        </button>
    </div>

    <script>
        const EXCHANGE_RATE = 11200;
        const usdInput = document.getElementById('usdInput');
        const calcBtn = document.getElementById('calc-btn');
        const clearBtn = document.getElementById('clear-btn');
        const resultArea = document.getElementById('result-area');
        const resTotal = document.getElementById('res-total');

        calcBtn.addEventListener('click', () => {
            const val = parseFloat(usdInput.value);
            if (!isNaN(val)) {
                resTotal.textContent = (val * EXCHANGE_RATE).toLocaleString() + " SLSH";
                resultArea.classList.remove('hidden');
                // Halkan ayaan ku daray animation yar
                resultArea.classList.add('block');
            }
        });

        clearBtn.addEventListener('click', () => {
            usdInput.value = '';
            resultArea.classList.add('hidden');
        });
    </script>
</body>
</html>
